name: CONX server CI
on:
  push:
    branches:
      - main
      - chore/ci-optimization
  pull_request:
    branches:
      - dev
      - main

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582
        with:
          cache-read-only: false

      - name: Build with Gradle Wrapper
        run: ./gradlew test -Dspring.profiles.active=ci --stacktrace

      - name: Debug - Print test XML
        if: failure()
        run: find . -path "*/test-results/test/*.xml" | xargs cat