name: CONX server CD
on:
  workflow_run:
    workflows:
      - "CONX server CI"
    types:
      - completed



jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Build Jar
        run: ./gradlew bootJar -x test

      - name: Setting Buildx Docker
        uses: docker/setup-buildx-action@v3

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64, linux/arm64
          tags: |
            contactconx/conx-server:latest
            contactconx/conx-server:${{ github.event.workflow_run.head_sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd /home/ubuntu/CONX-server
            git fetch origin
            git reset --hard origin/main
            
            cat > .env << EOF
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=admin
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            AWS_REGION=ap-northeast-2
            GOOGLE_USER=${{ secrets.GOOGLE_USER }}
            GOOGLE_PASSWORD=${{ secrets.GOOGLE_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            SPRING_PROFILES_ACTIVE=${{ secrets.SPRING_PROFILES_ACTIVE }}
            EOF
              
            sudo ./deploy.sh deploy ${{ github.event.workflow_run.head_sha }}
            sudo docker image prune -f