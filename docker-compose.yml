version: "3.8"

services:
  app:
    depends_on:
      redis:
        condition: service_started

    image: contactconx/conx-server:${IMAGE_TAG}
    ports:
      - "8082:8080"
    restart: unless-stopped
    env_file:
      - .env

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health/ready" ]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.2
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"