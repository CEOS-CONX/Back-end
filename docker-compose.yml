version: "3.8"

services:
  app:
    image: contactconx/conx-server:${IMAGE_TAG}
    ports:
      - "8080:8080"
    restart: unless-stopped
    env_file:
      - .env

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health/ready" ]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.2
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru