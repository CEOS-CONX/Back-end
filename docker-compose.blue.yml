services:
  app:
    container_name: conx-blue

    image: contactconx/conx-server:${IMAGE_TAG}

    ports:
      - "8081:8080"

    env_file:
      - .env

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5